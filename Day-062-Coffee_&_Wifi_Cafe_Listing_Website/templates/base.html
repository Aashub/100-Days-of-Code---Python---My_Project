<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    {% block styles %}
      {{ bootstrap.load_css() }}      <!-- Adding Bootstrap-Flask styling here -->
       <link rel="stylesheet" href="static/css/styles.css">        <!-- styles.css here to apply styling to all the child templates.-->
    {% endblock %}
    <title>{% block title %}{% endblock %}</title>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
